
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saarors github profile</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #0f0f0f;
            font-family: Arial, sans-serif;
            margin: 0;
            color: white;
        }

        .profile-container {
            background-color: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 300px;
            margin: 40px auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        .profile-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .profile-bio {
            font-size: 16px;
            color: #cccccc;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        #app {
            max-width: 800px;
            margin: 20px auto;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
        }

        a {
            color: #4ea1ff;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://avatars.githubusercontent.com/u/171342946?v=4" class="profile-image">
        <div class="profile-name">saarors</div>
        <div class="profile-bio">Software Developer | Open Source Enthusiast | Open source contributor</div>
        <div class="profile-links">
            <a href="https://github.com/saarors" target="_blank">GitHub</a>
        </div>
    </div>

    <h1>README.md</h1>
    <div id="app">Loading...</div>

<script>
fetch('https://api.github.com/repos/saarors/saarors/contents/README.md')
  .then(res => {
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  })
  .then(data => {
    const base64 = data.content.replace(/\n/g, '');
    const md = decodeURIComponent(
      Array.from(atob(base64))
        .map(c => '%' + c.charCodeAt(0).toString(16).padStart(2, '0'))
        .join('')
    );

    document.getElementById('app').innerHTML = marked.parse(md);
  })
  .catch(err => {
    document.getElementById('app').innerText = "Error: " + err.message;
    console.error(err);
  });
</script>

</body>
</html>
